worker_processes auto;
error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

# Load ModSecurity module
load_module /usr/local/openresty/nginx/modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # DNS resolver for Docker service names
    resolver 127.0.0.11 ipv6=off;
    
    # Lua settings
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";
    lua_shared_dict ml_queue 10m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Upstream to web interface
    upstream web_backend {
        server web_interface:8080;
    }

    # Main server block with ModSecurity
    server {
        listen 80;
        server_name localhost;

        # Proxy all requests to web interface
        location / {
            # ModSecurity is active here
            modsecurity on;
            modsecurity_rules_file /etc/modsecurity/main.conf;
            
            # Ensure request body is captured
            client_body_buffer_size 128k;
            client_max_body_size 10m;
            
            # Capture request data and send to ML detector asynchronously  
            log_by_lua_block {
                local cjson = require "cjson.safe"
                
                local request_method = ngx.var.request_method or "GET"
                local request_uri = ngx.var.request_uri or "/"
                local remote_addr = ngx.var.remote_addr or "unknown"
                local request_body = ngx.var.request_body or ""
                local uri_args_str = ngx.var.args or ""
                
                local headers = {}
                local all_headers = ngx.req.get_headers()
                for key, value in pairs(all_headers) do
                    if type(value) == "table" then
                        headers[key] = table.concat(value, ", ")
                    else
                        headers[key] = tostring(value)
                    end
                end
                
                local args = {}
                if uri_args_str ~= "" then
                    for pair in string.gmatch(uri_args_str, "[^&]+") do
                        local key, value = string.match(pair, "([^=]+)=?(.*)")
                        if key then
                            args[key] = value or ""
                        end
                    end
                end
                
                local full_request = {
                    method = request_method,
                    uri = request_uri,
                    client_ip = remote_addr,
                    headers = headers,
                    query = args,
                    body = request_body
                }
                
                local request_data_json = cjson.encode(full_request)
                if not request_data_json then
                    ngx.log(ngx.ERR, "Failed to encode request data")
                    return
                end
                
                local payload = {
                    request_data = request_data_json,
                    client_ip = remote_addr,
                    method = request_method,
                    uri = request_uri
                }
                
                local json_payload = cjson.encode(payload)
                if not json_payload then
                    ngx.log(ngx.ERR, "Failed to encode payload")
                    return
                end
                
                local payload_size = string.len(json_payload)
                
                ngx.log(ngx.INFO, "🔍 WAF: Captured ", request_method, " ", request_uri, " (", payload_size, " bytes)")
                
                local ok, err = ngx.timer.at(0, function(premature)
                    if premature then return end
                    
                    ngx.log(ngx.INFO, "🚀 Sending to ML detector...")
                    
                    local sock = ngx.socket.tcp()
                    sock:settimeout(2000)
                    
                    local conn_ok, conn_err = sock:connect("ml_detector", 5000)
                    if not conn_ok then
                        ngx.log(ngx.ERR, "❌ Connect failed: ", conn_err or "unknown")
                        return
                    end
                    
                    local http_request = "POST /api/detect HTTP/1.1\r\n" ..
                        "Host: ml_detector:5000\r\n" ..
                        "Content-Type: application/json\r\n" ..
                        "Content-Length: " .. payload_size .. "\r\n" ..
                        "Connection: close\r\n" ..
                        "\r\n" ..
                        json_payload
                    
                    local bytes, send_err = sock:send(http_request)
                    if not bytes then
                        ngx.log(ngx.ERR, "❌ Send failed: ", send_err or "unknown")
                        sock:close()
                        return
                    end
                    
                    ngx.log(ngx.INFO, "📤 Sent ", bytes, " bytes to ML detector")
                    
                    local resp, recv_err = sock:receive("*a")
                    sock:close()
                    
                    if resp then
                        ngx.log(ngx.INFO, "✅ ML detector responded")
                    else
                        ngx.log(ngx.WARN, "⚠️  No response: ", recv_err or "timeout")
                    end
                end)
                
                if not ok then
                    ngx.log(ngx.ERR, "❌ Timer failed: ", err or "unknown")
                end
            }
            
            # Proxy to web backend
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for slow backends
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        # Health check endpoint (bypass ModSecurity)
        location /health {
            modsecurity off;
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 403 /403.html;
        location = /403.html {
            internal;
            return 403 "Request blocked by WAF\n";
            add_header Content-Type text/plain;
        }
    }
}

