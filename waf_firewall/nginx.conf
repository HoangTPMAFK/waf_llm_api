worker_processes auto;
error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

# Load ModSecurity module
load_module /usr/local/openresty/nginx/modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # DNS resolver for Docker service names
    resolver 127.0.0.11 ipv6=off;
    
    # Lua settings
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";
    lua_shared_dict ml_queue 10m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Upstream to web interface
    upstream web_backend {
        server web_interface:8080;
    }

    # Main server block with ModSecurity
    server {
        listen 80;
        server_name localhost;

        # Proxy all requests to web interface
        location / {
            # ModSecurity is active here
            modsecurity on;
            modsecurity_rules_file /etc/modsecurity/main.conf;
            
            # Capture request data and send to ML detector asynchronously  
            log_by_lua_block {
                -- Capture request data
                local request_method = ngx.var.request_method
                local request_uri = ngx.var.request_uri
                local remote_addr = ngx.var.remote_addr
                
                ngx.log(ngx.INFO, "🔍 WAF: Captured request: ", request_method, " ", request_uri)
                
                -- Send to ML detector in background timer
                local ok, err = ngx.timer.at(0, function(premature)
                    ngx.log(ngx.INFO, "🚀 Timer started for ML detection")
                    
                    local cjson = require "cjson.safe"
                    
                    local full_request = request_method .. " " .. request_uri
                    local payload = {
                        request_data = full_request,
                        client_ip = remote_addr,
                        method = request_method,
                        uri = request_uri
                    }
                    
                    local json_payload = cjson.encode(payload)
                    if not json_payload then
                        ngx.log(ngx.ERR, "Failed to encode JSON")
                        return
                    end
                    
                    ngx.log(ngx.INFO, "📦 Connecting to ML detector...")
                    
                    local sock = ngx.socket.tcp()
                    sock:settimeout(1000)
                    
                    local ok2, err2 = sock:connect("ml_detector", 5000)
                    if not ok2 then
                        ngx.log(ngx.ERR, "Failed to connect: ", err2)
                        return
                    end
                    
                    ngx.log(ngx.INFO, "✅ Connected, sending payload")
                    
                    local http_request = string.format(
                        "POST /api/detect HTTP/1.1\r\n" ..
                        "Host: ml_detector:5000\r\n" ..
                        "Content-Type: application/json\r\n" ..
                        "Content-Length: %d\r\n" ..
                        "Connection: close\r\n" ..
                        "\r\n" ..
                        "%s",
                        #json_payload, json_payload
                    )
                    
                    sock:send(http_request)
                    local resp = sock:receive("*a")
                    sock:close()
                    
                    ngx.log(ngx.INFO, "✅ Response received from ML detector")
                end)
                
                if not ok then
                    ngx.log(ngx.ERR, "Failed to create timer: ", err)
                end
            }
            
            # Proxy to web backend
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for slow backends
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        # Health check endpoint (bypass ModSecurity)
        location /health {
            modsecurity off;
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 403 /403.html;
        location = /403.html {
            internal;
            return 403 "Request blocked by WAF\n";
            add_header Content-Type text/plain;
        }
    }
}

